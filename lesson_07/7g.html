<html>
  <head>
    <title>7D Exercise</title>
  </head>
  <body>
    <script>
      const convertLength = (length, from, to) => {
        // Invalid unit
        if (
          (from !== "km" && from !== "miles" && from !== "ft") ||
          (to !== "km" && to !== "miles" && to !== "ft")
        ) {
          return "Invalid unit";
        }

        //Valid Unit
        if (from === to) return length;
        else if (from === "km" && to === "miles") return length / 1.6;
        else if (from === "km" && to === "ft") return length * 3281;
        else if (from === "miles" && to === "ft") return length * 5280;
        else if (from === "miles" && to === "km") return length * 1.6;
        else if (from === "ft" && to === "km") return length / 3281;
        else if (from === "ft" && to === "miles") return length / 5280;
      };
      console.log(convertLength(5, "miles", "km"));
      console.log(convertLength(5, "miles", "ft"));
      console.log(convertLength(5, "km", "ft"));
    </script>
  </body>
</html>

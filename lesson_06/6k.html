<!doctype html>
<html>
  <head>
    <title>Cart Quantity</title>
  </head>
  <body>
    <button onclick="console.log(`Cart quantity: ${cartQuantity}`)">
      Show Quantity
    </button>

    <button
      onclick="
        if (cartQuantity + 1 <= maxCartQuantity) {
          cartQuantity++;
          console.log(`Cart quantity: ${cartQuantity}`);
        } else {
          console.log('The cart is full.');
        }
      "
    >
      Add to Cart
    </button>

    <button
      onclick="
        if (cartQuantity + 2 <= maxCartQuantity) {
          cartQuantity += 2;
          console.log(`Cart quantity: ${cartQuantity}`);
        } else {
          console.log('The cart is full.');
        }
      "
    >
      +2
    </button>

    <button
      onclick="
        if (cartQuantity + 3 <= maxCartQuantity) {
          cartQuantity += 3;
          console.log(`Cart quantity: ${cartQuantity}`);
        } else {
          console.log('The cart is full.');
        }
      "
    >
      +3
    </button>

    <button
      onclick="
        if (cartQuantity + 4 <= maxCartQuantity) {
          cartQuantity += 4;
          console.log(`Cart quantity: ${cartQuantity}`);
        } else {
          console.log('The cart is full.');
        }
      "
    >
      +4
    </button>

    <button
      onclick="
        if (cartQuantity + 5 <= maxCartQuantity) {
          cartQuantity += 5;
          console.log(`Cart quantity: ${cartQuantity}`);
        } else {
          console.log('The cart is full.');
        }
      "
    >
      +5
    </button>

    <!-- vvv This code was changed. vvv -->
    <button
      onclick="
        if (cartQuantity - 1 >= 0) {
          cartQuantity--;
          console.log(`Cart quantity: ${cartQuantity}`);
        } else {
          console.log('The cart is empty.');
        }
      "
    >
      Remove from cart
    </button>

    <button
      onclick="
        if (cartQuantity - 2 >= 0) {
          cartQuantity -= 2;
          console.log(`Cart quantity: ${cartQuantity}`);
        } else {
          console.log('The cart is empty.');
        }
      "
    >
      -2
    </button>

    <button
      onclick="
        if (cartQuantity - 3 >= 0) {
          cartQuantity -= 3;
          console.log(`Cart quantity: ${cartQuantity}`);
        } else {
          console.log('The cart is empty.');
        }
      "
    >
      -3
    </button>

    <button
      onclick="
        cartQuantity = 0;
        console.log('Cart was reset.');
        console.log(`Cart quantity: ${cartQuantity}`);
      "
    >
      Reset Cart
    </button>

    <script>
      let cartQuantity = 0;
      const maxCartQuantity = 10;
    </script>
  </body>
</html>
